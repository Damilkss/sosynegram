<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Вход | SosyneGram</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">

        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    </head>

    <body>
        <div class="auth-page-container">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1>
                            <i class="fas fa-sign-in-alt"></i>
                            Вход в систему
                        </h1>
                        <p class="auth-subtitle">Введите свои учетные данные</p>
                    </div>

                    <div class="auth-body">
                        <form action="{{ url_for('auth.login') }}" method="POST" id="loginForm" class="auth-form">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="form-group">
                                <label for="username">
                                    <i class="fas fa-user"></i>Имя пользователя
                                </label>
                                <input type="text"
                                       class="{% if username_error or general_error and not password_error %}is-invalid{% endif %}"
                                       id="username"
                                       name="username"
                                       value="{{ username_value if username_value else '' }}"
                                       placeholder="Введите имя пользователя"
                                       required>
                                <span class="invalid-feedback" id="usernameError">
                                    {% if username_error %}
                                        {{ username_error }}
                                    {% endif %}
                                </span>
                            </div>

                            <div class="form-group">
                                <label for="password">
                                    <i class="fas fa-lock"></i>Пароль
                                </label>
                                <input type="password"
                                       class="{% if password_error or general_error %}is-invalid{% endif %}"
                                       id="password"
                                       name="password"
                                       placeholder="Введите пароль"
                                       required>
                                <span class="invalid-feedback" id="passwordError">
                                    {% if password_error %}
                                        {{ password_error }}
                                    {% endif %}
                                </span>
                            </div>

                            <div class="form-group">
                                <button type="submit" class="btn btn-primary btn-block" id="loginButton">
                                    <i class="fas fa-sign-in-alt me-2"></i>Войти
                                </button>
                            </div>

                            <div class="text-center">
                                <p class="mb-0">Еще нет аккаунта?
                                    <a href="{{ url_for('auth.register') }}" class="auth-link">Зарегистрироваться</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="{{ url_for('static', filename='js/login.js') }}"></script>
    </body>
</html>
